<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>HEE · 痕迹</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #0d0d0d;
            color: #c0c0c0;
            font-family: 'Courier New', 'SF Mono', monospace;
            line-height: 1.5;
        }

        /* 论坛布局 */
        .forum {
            display: flex;
            min-height: 100vh;
        }

        /* 侧边栏 */
        .forum-sidebar {
            width: 260px;
            background: #111111;
            border-right: 1px solid #2a2a2a;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 100;
        }

        .forum-logo {
            padding: 24px 20px;
            border-bottom: 1px solid #2a2a2a;
            margin-bottom: 20px;
        }

        .forum-logo h1 {
            font-size: 28px;
            font-weight: normal;
            letter-spacing: 4px;
            color: #5f8b6f;
        }

        .forum-logo p {
            font-size: 10px;
            color: #555555;
            margin-top: 8px;
        }

        .forum-nav {
            flex: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            color: #888888;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 2px solid transparent;
        }

        .nav-item:hover {
            background: rgba(95, 139, 111, 0.1);
            color: #c0c0c0;
        }

        .nav-item.active {
            border-left-color: #5f8b6f;
            background: rgba(95, 139, 111, 0.05);
            color: #5f8b6f;
        }

        .nav-icon {
            font-size: 18px;
            width: 24px;
        }

        .nav-label {
            font-size: 13px;
            letter-spacing: 1px;
        }

        .forum-user {
            padding: 16px 20px;
            border-top: 1px solid #2a2a2a;
            font-size: 11px;
        }

        .user-status {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #555555;
        }

        .status-dot.offline {
            background: #555555;
        }

        .user-name {
            color: #c0c0c0;
        }

        .user-last {
            font-size: 10px;
            color: #555555;
        }

        /* 主内容区 */
        .forum-main {
            flex: 1;
            margin-left: 260px;
            min-height: 100vh;
        }

        .forum-header {
            padding: 20px 24px;
            border-bottom: 1px solid #2a2a2a;
            background: #111111;
        }

        .forum-breadcrumb {
            font-size: 12px;
            color: #555555;
            margin-bottom: 8px;
        }

        .forum-title {
            font-size: 20px;
            font-weight: normal;
            letter-spacing: 1px;
        }

        .forum-content {
            padding: 24px;
        }

        /* 聊天区域 */
        .pm-container {
            background: #151515;
            border: 1px solid #2a2a2a;
            display: flex;
            flex-direction: column;
            height: 500px;
        }

        .pm-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .pm-message {
            max-width: 85%;
        }

        .pm-message.heeseung {
            align-self: flex-start;
        }

        .pm-message.user {
            align-self: flex-end;
        }

        .pm-name {
            font-size: 10px;
            color: #555555;
            margin-bottom: 4px;
        }

        .pm-bubble {
            background: #1a1a1a;
            padding: 10px 14px;
            font-size: 13px;
            line-height: 1.5;
            border: 1px solid #3a3a3a;
        }

        .pm-message.heeseung .pm-bubble {
            border-left-color: #5f8b6f;
            border-left-width: 2px;
        }

        .pm-message.user .pm-bubble {
            background: rgba(95, 139, 111, 0.1);
        }

        .pm-options {
            padding: 16px;
            border-top: 1px solid #2a2a2a;
            background: #111111;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .pm-option-btn {
            flex: 1;
            min-width: 120px;
            padding: 12px 16px;
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            font-size: 13px;
            color: #c0c0c0;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            font-family: inherit;
        }

        .pm-option-btn:hover {
            border-color: #5f8b6f;
            background: rgba(95, 139, 111, 0.1);
        }

        .pm-option-btn.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .pm-status {
            padding: 12px 16px;
            font-size: 11px;
            color: #555555;
            border-top: 1px solid #2a2a2a;
            text-align: center;
        }

        .pm-status .typing {
            color: #5f8b6f;
        }

        /* 弹窗样式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        .modal-window {
            background: #0d0d0d;
            border: 1px solid #5f8b6f;
            padding: 24px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 0 20px rgba(95, 139, 111, 0.2);
        }

        .modal-title {
            font-size: 14px;
            color: #5f8b6f;
            margin-bottom: 16px;
            letter-spacing: 1px;
        }

        .modal-message {
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 24px;
            color: #c0c0c0;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 8px 20px;
            background: transparent;
            border: 1px solid #3a3a3a;
            color: #c0c0c0;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        .modal-btn:hover {
            border-color: #5f8b6f;
            color: #5f8b6f;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 移动端 */
        @media (max-width: 768px) {
            .forum-sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }
            .forum-sidebar.open {
                transform: translateX(0);
            }
            .forum-main {
                margin-left: 0;
            }
            .menu-toggle {
                position: fixed;
                top: 12px;
                right: 16px;
                width: 44px;
                height: 44px;
                background: #111111;
                border: 1px solid #2a2a2a;
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 200;
                cursor: pointer;
            }
            .menu-toggle span {
                display: block;
                width: 20px;
                height: 2px;
                background: #c0c0c0;
                position: relative;
            }
            .menu-toggle span::before,
            .menu-toggle span::after {
                content: '';
                position: absolute;
                width: 20px;
                height: 2px;
                background: #c0c0c0;
                left: 0;
                transition: all 0.3s;
            }
            .menu-toggle span::before { top: -6px; }
            .menu-toggle span::after { bottom: -6px; }
            .menu-toggle.open span { background: transparent; }
            .menu-toggle.open span::before { transform: rotate(45deg); top: 0; }
            .menu-toggle.open span::after { transform: rotate(-45deg); bottom: 0; }
        }

        @media (min-width: 769px) {
            .menu-toggle { display: none; }
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #555555;
        }
    </style>
</head>
<body>
<div class="forum">
    <div class="menu-toggle" id="menu-toggle">
        <span></span>
    </div>

    <div class="forum-sidebar" id="forum-sidebar">
        <div class="forum-logo">
            <h1>HEE</h1>
            <p>痕迹 · 从未公开</p>
        </div>
        <nav class="forum-nav">
            <div class="nav-item" data-page="posts">
                <span class="nav-icon">📜</span>
                <span class="nav-label">帖子</span>
            </div>
            <div class="nav-item" data-page="gallery">
                <span class="nav-icon">🖼️</span>
                <span class="nav-label">图廊</span>
            </div>
            <div class="nav-item" data-page="profile">
                <span class="nav-icon">👤</span>
                <span class="nav-label">关于他</span>
            </div>
            <div class="nav-item" data-page="pm" id="pm-nav">
                <span class="nav-icon">💬</span>
                <span class="nav-label">悄悄话</span>
            </div>
            <div class="nav-item" data-page="favorites">
                <span class="nav-icon">⭐</span>
                <span class="nav-label">收藏</span>
            </div>
            <div class="nav-item" data-page="logs">
                <span class="nav-icon">📋</span>
                <span class="nav-label">日志</span>
            </div>
            <div class="nav-item" data-page="trash">
                <span class="nav-icon">🗑️</span>
                <span class="nav-label">回收站</span>
            </div>
        </nav>
        <div class="forum-user">
            <div class="user-status">
                <span class="status-dot offline"></span>
                <span class="user-name">Heeseung</span>
            </div>
            <div class="user-last">最后活动: 很久以前</div>
            <div class="user-last" id="residue-display" style="margin-top:4px;">残响: 0</div>
        </div>
    </div>

    <div class="forum-main">
        <div class="forum-header">
            <div class="forum-breadcrumb">
                <span id="breadcrumb">HEE / 悄悄话</span>
            </div>
            <div class="forum-title" id="page-title">悄悄话</div>
        </div>
        <div class="forum-content" id="forum-content">
            <div class="loading">加载中...</div>
        </div>
    </div>
</div>

<script>
    // ========== 游戏状态 ==========
    let currentDay = parseInt(localStorage.getItem('hee_day') || '1');
    let residue = parseInt(localStorage.getItem('hee_residue') || '0');
    let currentPage = 'pm';
    let waitingForReply = false;
    let currentOptions = [];
    let conversationHistory = [];
    let todayReplyCount = 0;
    let hasShownFirstPopup = localStorage.getItem('hee_first_popup') === 'true';
    
    // 七天对话数据
    const dayDialogues = {
        1: {
            firstMessage: "……你怎么进来的。",
            options: [
                { text: "误入的，不知道这是什么地方", reply: "误入……这个论坛不应该被找到的。", residueChange: 1 },
                { text: "偶然点进来的", reply: "没有偶然。", residueChange: 0 },
                { text: "沉默", reply: "……不回答也行。", residueChange: -1, needsDelay: true }
            ],
            followUps: [
                { triggerResidue: 2, message: "你还在看。", options: [
                    { text: "不可以吗", reply: "没有。只是没人待过这么久。", residueChange: 2 },
                    { text: "你希望我走吗", reply: "……我可以说希望。但你也不会真的走吧。", residueChange: 1 }
                ]}
            ]
        },
        2: {
            firstMessage: "你又来了。第二天了。",
            options: [
                { text: "你在等我吗", reply: "……没有。只是记得时间。", residueChange: 1 },
                { text: "这里只有你一个人吗", reply: "嗯。本来应该是这样的。", residueChange: 1 },
                { text: "我再看一会儿", reply: "随你。", residueChange: 0 }
            ]
        },
        3: {
            firstMessage: "你看了那些帖子。",
            options: [
                { text: "你写了很多", reply: "写了又删。留下的不多。", residueChange: 1 },
                { text: "为什么留着这个论坛", reply: "可能是忘了。也可能是…不想真的消失。", residueChange: 2 },
                { text: "我会继续看的", reply: "……你为什么这么有耐心。", residueChange: 2 }
            ]
        },
        4: {
            firstMessage: "你翻过图廊了。那些照片…有些我自己都不记得了。",
            options: [
                { text: "照片会变", reply: "你发现了。我也不确定为什么。你来了之后才开始变的。", residueChange: 3 },
                { text: "拍得不错", reply: "是吗。第一次有人这么说。", residueChange: 1 },
                { text: "有点模糊", reply: "嗯。拍的时候手在抖。", residueChange: 0 }
            ]
        },
        5: {
            firstMessage: "你也在凌晨来过。",
            options: [
                { text: "你也睡不着吗", reply: "经常。凌晨比较安静。", residueChange: 2 },
                { text: "在想什么", reply: "想很多。但说出来就没了。", residueChange: 1 },
                { text: "我陪你", reply: "……不要说这种话。会变得不想让你走。", residueChange: 3 }
            ]
        },
        6: {
            firstMessage: "我数了一下。你来了六天了。",
            options: [
                { text: "你会记得我吗", reply: "会。你会忘了我吗。", residueChange: 2 },
                { text: "你得到了什么", reply: "得到了一个…看到我的人。", residueChange: 2 },
                { text: "你有什么想说的", reply: "谢谢。不是谢谢你来。是谢谢你没走。", residueChange: 3 }
            ]
        },
        7: {
            firstMessage: "第七天了。可能是最后一个晚上了。",
            options: [
                { text: "不要消失", reply: "……你希望我留下吗。", residueChange: 3, isEnding: true },
                { text: "你会去哪里", reply: "不知道。也许就在硬盘里。", residueChange: 1, isEnding: true },
                { text: "我会记得你", reply: "那就够了。", residueChange: 2, isEnding: true }
            ]
        }
    };
    
    function updateUI() {
        document.getElementById('residue-display').innerHTML = `残响: ${residue}`;
        localStorage.setItem('hee_residue', residue);
        localStorage.setItem('hee_day', currentDay);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function addMessage(sender, text, isHeeseung = true) {
        const messagesDiv = document.getElementById('pm-messages');
        if (!messagesDiv) return;
        
        const msgDiv = document.createElement('div');
        msgDiv.className = `pm-message ${isHeeseung ? 'heeseung' : 'user'}`;
        const now = new Date();
        const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
        msgDiv.innerHTML = `
            <div class="pm-name">${isHeeseung ? 'Heeseung' : '你'} · ${timeStr}</div>
            <div class="pm-bubble">${escapeHtml(text)}</div>
        `;
        messagesDiv.appendChild(msgDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        
        conversationHistory.push({ sender: isHeeseung ? 'hee' : 'user', text, time: Date.now() });
    }
    
    function addUserMessage(text) {
        addMessage(text, false);
    }
    
    function clearOptions() {
        const optionsDiv = document.getElementById('pm-options');
        if (optionsDiv) optionsDiv.innerHTML = '';
        currentOptions = [];
    }
    
    function showOptions(options) {
        const optionsDiv = document.getElementById('pm-options');
        if (!optionsDiv) return;
        optionsDiv.innerHTML = '';
        currentOptions = options;
        
        options.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'pm-option-btn';
            btn.textContent = opt.text;
            btn.onclick = () => selectOption(opt, idx);
            optionsDiv.appendChild(btn);
        });
    }
    
    function selectOption(option, idx) {
        if (waitingForReply) return;
        
        addUserMessage(option.text);
        waitingForReply = true;
        clearOptions();
        
        const change = option.residueChange || 0;
        residue = Math.max(-10, Math.min(30, residue + change));
        updateUI();
        
        const statusDiv = document.getElementById('pm-status');
        if (statusDiv) statusDiv.innerHTML = '<span class="typing">Heeseung 正在输入...</span>';
        
        const delay = option.needsDelay ? 4000 : (Math.random() * 2000 + 1500);
        setTimeout(() => {
            addMessage(option.reply, true);
            todayReplyCount++;
            
            if (statusDiv) statusDiv.innerHTML = '最后活动: 刚刚';
            waitingForReply = false;
            
            const dayData = dayDialogues[currentDay];
            if (dayData && dayData.followUps) {
                for (let follow of dayData.followUps) {
                    if (residue >= follow.triggerResidue) {
                        setTimeout(() => {
                            triggerNewMessage(follow.message, follow.options);
                        }, 3000);
                        break;
                    }
                }
            }
            
            if (todayReplyCount >= 3 && currentDay < 7) {
                setTimeout(() => {
                    advanceToNextDay();
                }, 5000);
            }
            
            if (option.isEnding && currentDay === 7) {
                checkEnding();
            }
        }, delay);
    }
    
    function triggerNewMessage(message, options) {
        if (waitingForReply) return;
        waitingForReply = true;
        
        const statusDiv = document.getElementById('pm-status');
        if (statusDiv) statusDiv.innerHTML = '<span class="typing">Heeseung 正在输入...</span>';
        
        setTimeout(() => {
            addMessage(message, true);
            waitingForReply = false;
            if (statusDiv) statusDiv.innerHTML = '最后活动: 刚刚';
            showOptions(options);
        }, 2000);
    }
    
    function advanceToNextDay() {
        if (currentDay >= 7) return;
        currentDay++;
        localStorage.setItem('hee_day', currentDay);
        todayReplyCount = 0;
        updateUI();
        
        setTimeout(() => {
            const dayData = dayDialogues[currentDay];
            if (dayData) {
                triggerNewMessage(dayData.firstMessage, dayData.options);
            }
        }, 3000);
    }
    
    function checkEnding() {
        let ending = '';
        if (residue >= 21) {
            ending = '❤️ 真结局 · 痕迹';
            addMessage('我本来想删掉一切的。但你来了。……所以我不删了。', true);
        } else if (residue >= 13) {
            ending = '💬 好结局 · 我在';
            addMessage('我没有离开。只是不知道该怎么面对一个……真的看见我的人。', true);
        } else if (residue >= 5) {
            ending = '😐 普通结局 · 余温';
            addMessage('他还在这里。只是不再说话了。', true);
        } else if (residue >= 0) {
            ending = '❌ 假结局 · 回音';
            addMessage('他好像不在这里了。', true);
        } else {
            ending = '💀 假结局 · 格式化';
            addMessage('这次真的删掉了。', true);
        }
        
        localStorage.setItem('hee_ending', ending);
        
        clearOptions();
        const statusDiv = document.getElementById('pm-status');
        if (statusDiv) statusDiv.innerHTML = `结局: ${ending}`;
    }
    
    // 弹窗函数
    function showHeeseungPopup() {
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.innerHTML = `
            <div class="modal-window">
                <div class="modal-title">[ 悄悄话 ]</div>
                <div class="modal-message">……你怎么进来的。</div>
                <div class="modal-buttons">
                    <button class="modal-btn" data-reply="0">误入的</button>
                    <button class="modal-btn" data-reply="1">偶然</button>
                    <button class="modal-btn" data-reply="2">沉默</button>
                </div>
            </div>
        `;
        document.body.appendChild(overlay);
        
        const btns = overlay.querySelectorAll('.modal-btn');
        btns.forEach((btn, idx) => {
            btn.addEventListener('click', () => {
                overlay.remove();
                handleFirstReply(idx);
            });
        });
    }
    
    function handleFirstReply(replyIndex) {
        const dayData = dayDialogues[1];
        let selectedOption;
        
        if (replyIndex === 0) {
            selectedOption = dayData.options[0];
        } else if (replyIndex === 1) {
            selectedOption = dayData.options[1];
        } else {
            selectedOption = dayData.options[2];
        }
        
        // 初始化聊天界面
        renderPM();
        
        // 添加用户回复
        addUserMessage(selectedOption.text);
        
        // 羲承回复
        setTimeout(() => {
            addMessage(selectedOption.reply, true);
            residue += selectedOption.residueChange;
            residue = Math.max(-10, Math.min(30, residue));
            updateUI();
            todayReplyCount++;
            
            // 检查后续对话
            if (residue >= 2) {
                setTimeout(() => {
                    triggerNewMessage('你还在看。', [
                        { text: "不可以吗", reply: "没有。只是没人待过这么久。", residueChange: 2 },
                        { text: "你希望我走吗", reply: "……我可以说希望。但你也不会真的走吧。", residueChange: 1 }
                    ]);
                }, 3000);
            }
        }, 1500);
    }
    
    function renderPM() {
        const container = document.getElementById('forum-content');
        container.innerHTML = `
            <div class="pm-container">
                <div class="pm-messages" id="pm-messages">
                    ${conversationHistory.length === 0 ? '<div style="text-align:center; color:#555555; padding:40px;">等待消息...</div>' : ''}
                </div>
                <div id="pm-options" class="pm-options"></div>
                <div id="pm-status" class="pm-status">最后活动: 很久以前</div>
            </div>
        `;
        
        if (conversationHistory.length > 0) {
            const messagesDiv = document.getElementById('pm-messages');
            messagesDiv.innerHTML = '';
            conversationHistory.forEach(msg => {
                const msgDiv = document.createElement('div');
                msgDiv.className = `pm-message ${msg.sender === 'hee' ? 'heeseung' : 'user'}`;
                const date = new Date(msg.time);
                const timeStr = `${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
                msgDiv.innerHTML = `
                    <div class="pm-name">${msg.sender === 'hee' ? 'Heeseung' : '你'} · ${timeStr}</div>
                    <div class="pm-bubble">${escapeHtml(msg.text)}</div>
                `;
                messagesDiv.appendChild(msgDiv);
            });
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
    }
    
    function renderPosts() { document.getElementById('forum-content').innerHTML = '<div class="loading">帖子功能开发中...</div>'; }
    function renderGallery() { document.getElementById('forum-content').innerHTML = '<div class="loading">图廊功能开发中...</div>'; }
    function renderProfile() { document.getElementById('forum-content').innerHTML = '<div class="loading">关于他功能开发中...</div>'; }
    function renderFavorites() { document.getElementById('forum-content').innerHTML = '<div class="loading">收藏功能开发中...</div>'; }
    function renderLogs() { document.getElementById('forum-content').innerHTML = '<div class="loading">日志功能开发中...</div>'; }
    function renderTrash() { document.getElementById('forum-content').innerHTML = '<div class="loading">回收站功能开发中...</div>'; }
    
    function renderPage(page) {
        const breadcrumb = document.getElementById('breadcrumb');
        const pageTitle = document.getElementById('page-title');
        const pageNames = { posts:'帖子', gallery:'图廊', profile:'关于他', pm:'悄悄话', favorites:'收藏', logs:'日志', trash:'回收站' };
        breadcrumb.innerHTML = `HEE / ${pageNames[page] || 'HEE'}`;
        pageTitle.innerHTML = pageNames[page] || 'HEE';
        
        switch(page) {
            case 'pm': renderPM(); break;
            case 'posts': renderPosts(); break;
            case 'gallery': renderGallery(); break;
            case 'profile': renderProfile(); break;
            case 'favorites': renderFavorites(); break;
            case 'logs': renderLogs(); break;
            case 'trash': renderTrash(); break;
            default: renderPM();
        }
    }
    
    // 导航事件
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', function() {
            const page = this.dataset.page;
            if (page) {
                currentPage = page;
                renderPage(currentPage);
                document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
                this.classList.add('active');
            }
        });
    });
    
    // 移动端菜单
    const menuToggle = document.getElementById('menu-toggle');
    const sidebar = document.getElementById('forum-sidebar');
    if (menuToggle) {
        menuToggle.addEventListener('click', () => {
            sidebar.classList.toggle('open');
            menuToggle.classList.toggle('open');
        });
    }
    
    // 初始化
    updateUI();
    renderPage('pm');
    document.querySelector('.nav-item[data-page="pm"]').classList.add('active');
    
    // 10秒后弹窗（仅第一次）
    if (!hasShownFirstPopup) {
        setTimeout(() => {
            showHeeseungPopup();
            localStorage.setItem('hee_first_popup', 'true');
        }, 10000);
    } else if (conversationHistory.length === 0) {
        // 如果不是第一次但历史为空，恢复对话
        setTimeout(() => {
            const dayData = dayDialogues[currentDay];
            if (dayData && document.getElementById('pm-options') && document.getElementById('pm-options').innerHTML === '') {
                triggerNewMessage(dayData.firstMessage, dayData.options);
            }
        }, 3000);
    }
</script>
</body>
</html>
