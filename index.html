<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>HEE · 痕迹</title>
    <meta name="description" content="一个从未公开过的私人论坛">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/forum.css">
    <link rel="stylesheet" href="css/mobile.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
    <!-- 启动画面 -->
    <div id="boot-screen" class="boot-screen">
        <div class="boot-content">
            <div class="boot-logo">HEE</div>
            <div class="boot-text">Connecting to forum...</div>
            <div class="boot-text delay-1">Last active: <span id="last-login">--</span></div>
            <div class="boot-text delay-2 cursor-blink">Click anywhere to enter_</div>
        </div>
    </div>

    <!-- 论坛主框架（初始隐藏） -->
    <div id="forum-container" style="display: none;">
        <iframe id="forum-iframe" src="forum.html" style="width:100%; height:100vh; border:none;"></iframe>
    </div>

    <script>
        (function() {
            // 记录最后访问时间
            var lastLogin = localStorage.getItem('hee_last_login');
            var now = new Date().toISOString().slice(0, 19).replace('T', ' ');
            var lastLoginSpan = document.getElementById('last-login');
            
            if (lastLogin) {
                lastLoginSpan.textContent = lastLogin;
            } else {
                lastLoginSpan.textContent = '2024-12-31 04:13';
            }
            localStorage.setItem('hee_last_login', now);
            
            // 残响值初始化（如果不存在）
            if (localStorage.getItem('hee_residue') === null) {
                localStorage.setItem('hee_residue', '0');
            }
            
            // 天数初始化
            if (localStorage.getItem('hee_day') === null) {
                localStorage.setItem('hee_day', '1');
            }
            
            // 点击任意位置进入论坛
            var bootScreen = document.getElementById('boot-screen');
            var forumContainer = document.getElementById('forum-container');
            
            function enterForum() {
                bootScreen.style.opacity = '0';
                setTimeout(function() {
                    bootScreen.style.display = 'none';
                    forumContainer.style.display = 'block';
                }, 500);
            }
            
            bootScreen.addEventListener('click', enterForum);
            bootScreen.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') enterForum();
            });
        })();
    </script>
</body>
</html>
